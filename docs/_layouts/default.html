<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}" dir="{{ page.text_direction | default: 'ltr' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
    {% seo %}
    {% if page.url contains '/locales/' %}
    <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ site.baseurl }}/">
    {% for locale in site.data.locales %}
    <link rel="alternate" hreflang="{{ locale.hreflang }}" href="{{ site.url }}{{ site.baseurl }}{{ locale.href }}">
    {% endfor %}
    {% endif %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <style>
      .quantai-page-header {
        margin-bottom: 2rem;
      }

      .quantai-brand {
        font-weight: 700;
      }

      .quantai-page-footer {
        margin-top: 3rem;
        padding-top: 1rem;
        border-top: 1px solid #d0d7de;
        color: #57606a;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main class="container-lg px-3 my-5 markdown-body">
      <header class="quantai-page-header">
        <a class="quantai-brand" href="{{ '/' | relative_url }}">QuantAI</a>
      </header>
      {{ content }}
      <footer class="quantai-page-footer">
        <p>Official website: <a href="https://aiquant.io">aiquant.io</a>. Support: <a href="mailto:support@aiquant.io">support@aiquant.io</a>.</p>
      </footer>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
    <script>anchors.add();</script>
  </body>
</html>
